<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="article">
  <meta property="og:image" content="{{ '/featured.png' | prepend: site.baseurl | prepend: site.url }}">

  <!-- Pico CSS (classless) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

  <style>
    :root {
      --pico-font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --pico-font-size: 17px;
      --pico-line-height: 1.7;
    }

    body {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* Title */
    h1 {
      font-size: 2.2rem;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    h2 {
      margin-top: 2.5rem;
    }

    h3 {
      margin-top: 2rem;
    }

    /* Images: constrained, centered */
    article img {
      max-width: 600px;
      width: 100%;
      height: auto;
      display: block;
      margin: 1.5rem auto;
      border-radius: 6px;
    }

    /* Featured image at top — allow wider */
    article > p:first-of-type img {
      max-width: 100%;
      border-radius: 8px;
    }

    /* Blockquotes (prompt section) */
    blockquote {
      border-left: 3px solid var(--pico-primary);
      padding-left: 1.2rem;
      font-style: italic;
    }

    /* Code blocks */
    pre {
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    code {
      font-size: 0.9em;
    }

    /* Tables */
    table {
      font-size: 0.9rem;
    }

    /* Mermaid diagrams */
    .mermaid {
      text-align: center;
      margin: 2rem auto;
      max-width: 700px;
      background: transparent;
    }

    .mermaid svg {
      max-width: 100%;
      height: auto;
    }

    /* Footnotes */
    .footnotes {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--pico-muted-border-color);
      font-size: 0.85rem;
    }

    /* Horizontal rules */
    hr {
      margin: 2.5rem 0;
    }

    /* Intro italic paragraph */
    article > p:nth-of-type(2) {
      font-size: 0.95rem;
      color: var(--pico-muted-color);
    }

    /* Footer credit */
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--pico-muted-border-color);
      font-size: 0.85rem;
      color: var(--pico-muted-color);
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <article>
      {{ content }}
    </article>
  </main>

  <!-- Mermaid diagram rendering -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'neutral',
      flowchart: { useMaxWidth: true, htmlLabels: true }
    });

    // Jekyll/kramdown renders ```mermaid as <pre><code class="language-mermaid">
    const codeBlocks = document.querySelectorAll('pre code.language-mermaid');
    codeBlocks.forEach((codeEl) => {
      const pre = codeEl.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeEl.textContent;
      pre.replaceWith(div);
    });

    await mermaid.run();
  </script>
</body>
</html>
